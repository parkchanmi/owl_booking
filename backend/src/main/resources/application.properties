spring.application.name=backend



# DB 연결
spring.datasource.url=jdbc:mysql://localhost:3306/booking_database?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin1234

# DB 초기화 시 FK 제약으로 인한 DROP 실패 방지 (개발 전용)
spring.datasource.hikari.connection-init-sql=SET FOREIGN_KEY_CHECKS=0

# JPA 설정
spring.jpa.hibernate.ddl-auto=create
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect.storage_engine=innodb
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.auto_quote_keyword=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

